<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GreenTransport Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #map { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
  // Inicializar mapa en Paysandú
  var map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([-32.0653, -57.3272], 17);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // Marcador del usuario
  var marcador = L.marker([-32.0653, -57.3272]).addTo(map);

  // Línea del recorrido
  var puntos = [];
  var linea = L.polyline([], {
    color: '#1D9E75',
    weight: 5,
    opacity: 0.9
  }).addTo(map);

  var grabando = false;
  var latAnterior = 0;
  var lonAnterior = 0;
  var totalKm = 0;
  var totalAhorro = 0;
  var tipoTransporte = '';
  var watchId = null;

  // ── Funciones llamadas desde App Inventor ──

  // Iniciar recorrido
  function iniciarRecorrido(tipo) {
    tipoTransporte = tipo;
    grabando = true;
    puntos = [];
    totalKm = 0;
    totalAhorro = 0;
    latAnterior = 0;
    lonAnterior = 0;
    linea.setLatLngs([]);

    watchId = navigator.geolocation.watchPosition(
      function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;

        // Mover marcador y centrar mapa
        marcador.setLatLng([lat, lon]);
        map.setView([lat, lon], map.getZoom());

        if (!grabando) return;

        if (latAnterior !== 0) {
          // Calcular distancia
          var difLat = (lat - latAnterior) * 111.32;
          var difLon = (lon - lonAnterior) * 111.32 * Math.cos(lat * 0.01745);
          var distancia = Math.sqrt(difLat * difLat + difLon * difLon);

          if (distancia > 0.002) {
            totalKm += distancia;

            if (tipoTransporte === 'A pie') {
              totalAhorro = totalKm * 7;
            } else if (tipoTransporte === 'Bicicleta') {
              totalAhorro = totalKm * 6.3;
            }

            // Dibujar línea
            puntos.push([lat, lon]);
            linea.setLatLngs(puntos);

            // Formatear valores
            var kmMostrar = Math.round(totalKm * 100) / 100;
            var ahorroMostrar = Math.round(totalAhorro * 100) / 100;

            // Enviar datos a App Inventor
            try {
              AppInventor.setWebViewString(
                kmMostrar + '|' + ahorroMostrar
              );
            } catch(e) {}
          }
        }

        latAnterior = lat;
        lonAnterior = lon;
      },
      function(err) {
        console.log('GPS error: ' + err.message);
      },
      {
        enableHighAccuracy: true,
        timeout: 5000,
        maximumAge: 0
      }
    );
  }

  // Detener recorrido
  function detenerRecorrido() {
    grabando = false;
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
    var kmFinal = Math.round(totalKm * 100) / 100;
    var ahorroFinal = Math.round(totalAhorro * 100) / 100;
    try {
      AppInventor.setWebViewString('FIN|' + kmFinal + '|' + ahorroFinal + '|' + tipoTransporte);
    } catch(e) {}
    return kmFinal + '|' + ahorroFinal;
  }

  // Limpiar mapa
  function limpiarMapa() {
    puntos = [];
    linea.setLatLngs([]);
  }
</script>
</body>
</html>
