<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GreenTransport Mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <script>
    var map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    }).setView([-32.0653, -57.3272], 17);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19
    }).addTo(map);

    var marcador = L.marker([-32.0653, -57.3272]).addTo(map);

    var puntos = [];
    var linea = L.polyline([], {
      color: '#1D9E75',
      weight: 5,
      opacity: 0.9
    }).addTo(map);

    var grabando = false;
    var latAnterior = 0;
    var lonAnterior = 0;
    var totalKm = 0;
    var totalAhorro = 0;
    var tipoTransporte = '';
    var watchId = null;
    var region = 'UY';

    function iniciarRecorrido(tipo, reg) {
      tipoTransporte = tipo;
      region = reg;
      grabando = true;
      puntos = [];
      totalKm = 0;
      totalAhorro = 0;
      latAnterior = 0;
      lonAnterior = 0;
      linea.setLatLngs([]);

      watchId = navigator.geolocation.watchPosition(
        function (pos) {
          var lat = pos.coords.latitude;
          var lon = pos.coords.longitude;

          marcador.setLatLng([lat, lon]);
          map.setView([lat, lon], map.getZoom());

          if (!grabando) return;

          if (latAnterior !== 0) {
            var difLat = (lat - latAnterior) * 111.32;
            var difLon = (lon - lonAnterior) * 111.32 * Math.cos(lat * 0.01745);
            var distancia = Math.sqrt(difLat * difLat + difLon * difLon);

            if (distancia > 0.002) {
              totalKm += distancia;

              var co2;
              var distMostrar;

              if (region === 'UY') {
                if (tipoTransporte === 'A pie') {
                  totalAhorro = totalKm * 7;
                } else {
                  totalAhorro = totalKm * 6.3;
                }
                co2 = Math.round(totalKm * 0.25 * 1000) / 1000;
                distMostrar = Math.round(totalKm * 100) / 100;
              } else {
                var distMi = totalKm * 0.621371;
                if (tipoTransporte === 'A pie') {
                  totalAhorro = distMi * 0.15;
                } else {
                  totalAhorro = distMi * 0.14;
                }
                co2 = Math.round(distMi * 0.4 * 1000) / 1000;
                distMostrar = Math.round(distMi * 100) / 100;
              }

              puntos.push([lat, lon]);
              linea.setLatLngs(puntos);

              var ahorroMostrar = Math.round(totalAhorro * 100) / 100;

              try {
                AppInventor.setWebViewString(
                  distMostrar + '|' + ahorroMostrar + '|' + co2
                );
              } catch (e) { }
            }
          }

          latAnterior = lat;
          lonAnterior = lon;
        },
        function (err) {
          console.log('GPS error: ' + err.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 30000,
          maximumAge: 3000
        }
      );
    }

    function detenerRecorrido() {
      grabando = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      var kmFinal = Math.round(totalKm * 100) / 100;
      var ahorroFinal = Math.round(totalAhorro * 100) / 100;
      try {
        AppInventor.setWebViewString('FIN|' + kmFinal + '|' + ahorroFinal + '|' + tipoTransporte);
      } catch (e) { }
      return kmFinal + '|' + ahorroFinal;
    }

    function limpiarMapa() {
      puntos = [];
      linea.setLatLngs([]);
    }
  </script>
</body>

</html>
